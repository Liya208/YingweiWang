  summary: Focusing on the critical mechanisms, core materials, and key technologies required for next-generation information devices such as photonic and quantum chips, the research group conducts original basic and applied research on the interaction between light and matter at the micro- and nano-scales. Centered on physical challenges related to the coupling and control of multi-physical fields—including optical, electrical, and magnetic fields—at the micro- and nano-scales, the group develops novel nanophotonic devices characterized by broad spectral coverage, fast response times, and high sensitivity.

